version: '3.8'

services:
  cpp_ingestion:
    build: 
      context: ./cpp_ingestion_core
    volumes:
      - ./shared_data:/data # For the massive CSV files
    network_mode: host # For absolute lowest latency ZMQ IPC
    deploy:
      resources:
        limits:
          cpus: '6' # Isolate cores on the Ultra 7

  ml_backend:
    build:
      context: ./python_ml_backend
    volumes:
      - ./shared_data:/data
    network_mode: host
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  react_dashboard:
    build:
      context: ./frontend/react_web_app
    ports:
      - "3000:3000"
    depends_on:
      - ml_backend
